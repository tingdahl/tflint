name: tflint
version: v0.62.1
title: tflint
contact: https://github.com/tingdahl/tflint
website: https://github.com/tingdahl/tflint
license: MPL-2.0
summary: Linter for terraform definitions
description: >
      The tflint from https://github.com/terraform-linters/tflint . 
      The the snap should follow the upstream project.
adopt-info: tflint
source-code: https://github.com/tingdahl/tflint.git
grade: stable
base: core24

architectures:
  - build-on: amd64
  - build-on: arm64
  - build-on: armhf
  - build-on: ppc64el
  - build-on: s390x

confinement: strict

apps:
  tflint:
    command: tflint
    plugs:
      - home
      - removable-media
      - network-bind
parts:
  tflint:
    plugin: go
    build-environment:
      - GOBIN: "$CRAFT_PRIME"
    build-snaps:
      - go/1.25/stable
    source-type: git
    override-build: |
      # build the latest tagged release
      make install
    source: https://github.com/tingdahl/tflint.git
