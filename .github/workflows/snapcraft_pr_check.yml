name: Snapcraft PR check

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapcraft-pack:
    # Always run when manually dispatched, and only for sync branches on PR events.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'sync-upstream-')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Build snap package
        run: |
          # Use destructive mode on GitHub-hosted runners.
          sudo snapcraft pack --destructive-mode

      - name: Install built snap
        run: |
          set -euo pipefail

          snap_file="$(ls -1 ./*.snap | head -n1)"
          sudo snap install --dangerous "${snap_file}"

      - name: Run recursive smoke checks against existing test-data
        run: |
          set -euo pipefail

          # Use a neutral config so we can execute against upstream recursive
          # test-data without depending on internal integration plugins.
          ci_config_path="$PWD/.tflint-ci.hcl"
          cat > "${ci_config_path}" <<'EOF'
          plugin "terraform" {
            enabled = true
          }
          EOF

          run_and_check() {
            local label="$1"
            local dir="$2"
            local out_file
            out_file="$(mktemp)"

            echo "Running recursive check: ${label} (${dir})"
            if ! tflint --chdir "${dir}" --recursive --config "${ci_config_path}" --format json --force >"${out_file}"; then
              echo "tflint exited non-zero for ${label}"
              cat "${out_file}"
              return 1
            fi

            if ! jq -e . "${out_file}" >/dev/null 2>&1; then
              echo "tflint output is not valid JSON for ${label}"
              cat "${out_file}"
              return 1
            fi

            if ! jq -e '.errors | length == 0' "${out_file}" >/dev/null 2>&1; then
              echo "tflint reported runtime errors for ${label}"
              cat "${out_file}"
              return 1
            fi

            echo "Recursive check passed: ${label}"
          }

          run_and_check "basic" "integrationtest/recursive/basic"
          run_and_check "filter" "integrationtest/recursive/filter"
          run_and_check "chdir" "integrationtest/recursive/chdir"

      - name: Print snapcraft execution log on failure
        if: failure()
        run: |
          set -euo pipefail

          log_dir="$HOME/.local/state/snapcraft/log"
          latest_log="$(ls -1t "${log_dir}"/snapcraft-*.log 2>/dev/null | head -n1 || true)"

          if [[ -z "${latest_log}" ]]; then
            echo "No snapcraft execution log file found in ${log_dir}"
            exit 0
          fi

          cp "${latest_log}" snapcraft-execution.log
          echo "::group::Snapcraft execution log"
          cat snapcraft-execution.log
          echo "::endgroup::"
